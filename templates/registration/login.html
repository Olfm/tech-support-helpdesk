{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<h1>Вход</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Войти</button>
    </form>
    <p class="muted">Нет аккаунта? <a href="{% url 'accounts:signup' %}">Зарегистрируйтесь</a>.</p>
</div>
{% endblock %}
