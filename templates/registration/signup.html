{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h1>Регистрация</h1>
<div class="card">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p class="muted">Уже есть аккаунт? <a href="{% url 'accounts:login' %}">Войдите</a>.</p>
</div>
{% endblock %}
